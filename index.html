<!DOCTYPE html>
<html lang="ar" dir="rtl">
<div style="position: fixed; top: 0; left: 0; font-size: 10px; padding: 5px; color: #ffffff; font-weight: bold; text-align: left;">
    <div>قسم التعليم الإلكتروني</div>
    <div>مع تحيات قسم التعليم الإلكتروني</div>
</div>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شهادات تكريم الطلاب بمنصة قطر للتعليم - تكبير حر خارج الحدود</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 300;
            color: #00d4ff;
        }

        #play-btn {
            background: transparent;
            border: 2px solid #00d4ff;
            color: #00d4ff;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            margin-bottom: 10px;
            transition: all 0.3s ease;
            opacity: 0; 
            visibility: hidden;
            font-weight: bold;
            z-index: 200;
        }

        #play-btn.show { opacity: 1; visibility: visible; }

        .swiper {
            width: 100%;
            padding-top: 50px;
            padding-bottom: 80px;
            /* السماح للصور بالخروج من حدود السلايدر العلوي والسفلي */
            overflow: visible !important; 
        }

        .swiper-slide {
            /* تعديل الأبعاد هنا لتصبح بالعرض */
            width: 450px; 
            height: 350px; 
            background: #1a1a1a;
            border-radius: 20px;
            /* إزالة overflow hidden للسماح للصورة بالخروج */
            overflow: visible !important; 
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            transition: z-index 0.3s;
        }

        /* حاوية الزووم */
        .swiper-zoom-container {
            width: 100%;
            height: 75%;
            position: relative;
            /* التأكد من أن الزووم يمكنه التمدد خارج الحاوية */
            overflow: visible !important; 
        }

        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px 20px 0 0;
            border-bottom: 2px solid #00d4ff;
            transition: transform 0.3s ease;
        }

        /* عند التكبير، نجعل السلايدر فوق الجميع */
        .swiper-slide-zoomed {
            z-index: 1000 !important;
        }

        .text-content {
            padding: 15px;
            text-align: center;
            background: #1a1a1a;
            border-radius: 0 0 20px 20px;
            flex-grow: 1;
            z-index: 10;
        }

        .text-content h3 { margin: 0; font-size: 1.2rem; color: #fff; }
        .text-content p { margin: 5px 0 0; font-size: 0.9rem; color: #aaa; }
        .swiper-pagination-bullet { background: #00d4ff; }
    </style>
</head>
<body>

<div class="container">
    <h1>معرض الصور -شهادات تكريم الطلاب بمنصة قطر للتعليم  2025-2026</h1>
    <button id="play-btn" onclick="resumeAutoplay()">استمرار العرض التلقائي</button>
    
    <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="gallery-wrapper"></div>
        <div class="swiper-pagination"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
    const wrapper = document.getElementById('gallery-wrapper');
    const playBtn = document.getElementById('play-btn');

    for (let i = 1; i <= 100; i++) {
        wrapper.innerHTML += `
            <div class="swiper-slide">
                <div class="swiper-zoom-container">
                    <img src="images/${i}.JPEG" alt="صورة رقم ${i}" onerror="this.src='https://via.placeholder.com/450x350?text=Image+Not+Found'">
                </div>
                <div class="text-content">
                    <h3>الصورة رقم ${i}</h3>
                    <p>وصف توضيحي للمحتوى رقم ${i}</p>
                </div>
            </div>`;
    }

    var swiper = new Swiper(".mySwiper", {
        effect: "coverflow", 
        grabCursor: true,
        centeredSlides: true,
        slidesPerView: "auto",
        loop: true,
        zoom: {
            maxRatio: 2.5, // التكبير لمرتين ونصف
            minRatio: 1,
            toggle: true, 
        },
        // استخدام عجلة الماوس للتحكم بالسلايدر
        mousewheel: true, 
        coverflowEffect: {
            rotate: 35, stretch: 0, depth: 250, modifier: 1, slideShadows: false, 
        },
        autoplay: {
            delay: 3000,
            disableOnInteraction: true, 
        },
        pagination: { el: ".swiper-pagination", clickable: true },
        on: {
            autoplayStop: function () { playBtn.classList.add('show'); },
            autoplayStart: function () { playBtn.classList.remove('show'); },
            // منع تداخل السحب مع الزووم
            zoomChange: function(s, scale, imageEl) {
                if (scale > 1) {
                    this.autoplay.stop();
                    // إضافة كلاس لرفع z-index عند التكبير
                    if(this.clickedSlide) this.clickedSlide.style.zIndex = "1000";
                } else {
                    if(this.clickedSlide) this.clickedSlide.style.zIndex = "1";
                }
            }
        },
    });

    function resumeAutoplay() { swiper.autoplay.start(); }
</script>

</body>
</html>
